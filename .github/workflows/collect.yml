name: Collect daily rack prices

on:
  schedule:
    - cron: "20 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: collect-rack-prices
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m unittest discover -s tests
      - run: python scripts/collect.py
      - name: Commit new snapshot
        run: |
          if git diff --quiet -- docs/data; then
            echo "No source change"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data
          git commit -m "data: collect $(date -u +%F) rack prices"
          git push

